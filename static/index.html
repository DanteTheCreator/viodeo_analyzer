<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Video Ad Reviewer</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #222831;
    color: #EEEEEE;
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr;
    overflow: hidden;
  }

  header {
    background: #31363F;
    border-bottom: 1px solid #76ABAE44;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 16px;
  }
  header h1 { font-size: 15px; font-weight: 600; color: #76ABAE; }
  header span { font-size: 12px; color: #7a9699; }

  .workspace {
    display: grid;
    grid-template-columns: 1fr 360px;
    overflow: hidden;
  }

  /* ── Left panel ── */
  .left-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid #31363F;
  }

  .video-wrap {
    background: #000;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    position: relative;
    min-height: 240px;
    max-height: 55vh;
  }
  #videoEl {
    max-width: 100%;
    max-height: 55vh;
    display: block;
  }
  .upload-placeholder {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    color: #55696d;
    cursor: pointer;
    border-radius: 8px;
    padding: 20px;
    transition: background .15s, color .15s;
  }
  .upload-placeholder:hover { background: #31363F; color: #76ABAE; }
  .upload-placeholder:hover svg { opacity: .65; }
  .upload-placeholder svg { width: 48px; height: 48px; opacity: .4; transition: opacity .15s; }
  .btn {
    padding: 9px 20px;
    border-radius: 7px;
    border: none;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: opacity .15s;
  }
  .btn:hover { opacity: .85; }
  .btn-primary { background: #76ABAE; color: #222831; font-weight: 600; }
  .btn-ghost { background: #31363F; color: #EEEEEE; }
  .btn-ai { background: #31363F; color: #76ABAE; border: 1px solid #76ABAE44; }
  #currentTime {
    font-size: 11px;
    color: #7a9699;
    letter-spacing: .03em;
  }
  .btn-oracle {
    background: linear-gradient(135deg, #1a3a3a, #2a6060);
    color: #76ABAE;
    font-weight: 700;
    letter-spacing: .03em;
    border: 1px solid #76ABAE55;
  }
  .btn-oracle:hover { opacity: .9; }
  .btn-sm { padding: 7px 14px; font-size: 13px; }

  #uploadInput { display: none; }

  /* upload overlay */
  #uploadBanner {
    display: none;
    position: fixed;
    inset: 0;
    z-index: 9999;
    background: rgba(34,40,49,0.72);
    backdrop-filter: blur(2px);
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: #76ABAE;
    font-size: 13px;
    letter-spacing: 0.03em;
  }
  .upload-spinner {
    width: 40px;
    height: 40px;
    border: 3px solid #76ABAE33;
    border-top-color: #76ABAE;
    border-radius: 50%;
    animation: spin 0.75s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Timeline ── */
  .timeline-section {
    flex: 1;
    overflow: hidden;
    padding: 12px 16px;
    display: flex;
    flex-direction: column;
    gap: 10px;
    min-height: 0;
  }
  .timeline-label {
    font-size: 11px;
    color: #7a9699;
    text-transform: uppercase;
    letter-spacing: .06em;
    margin-bottom: 2px;
  }

  .timeline-bar-wrap {
    position: relative;
    height: 42px;
    background: #31363F;
    border-radius: 8px;
    cursor: pointer;
    user-select: none;
    border: 1px solid #76ABAE33;
    flex-shrink: 0;
  }
  #progressBar {
    height: 100%;
    background: #76ABAE40;
    border-radius: 6px;
    width: 0%;
    pointer-events: none;
  }
  #playhead {
    position: absolute;
    top: 0; bottom: 0;
    width: 2px;
    background: #76ABAE;
    left: 0;
    pointer-events: none;
    transition: left .1s linear;
  }
  .comment-pin {
    position: absolute;
    top: 4px;
    width: 3px;
    height: 34px;
    border-radius: 2px;
    transform: translateX(-50%);
    cursor: pointer;
    transition: opacity .15s, transform .15s;
  }
  .comment-pin::before {
    content: '';
    position: absolute;
    top: -6px;
    left: 50%;
    transform: translateX(-50%);
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: inherit;
  }
  .comment-pin:hover { opacity: .8; transform: translateX(-50%) scaleY(1.08); }
  .pin-user { background: #f59e0b; }
  .pin-ai   { background: #60a5fa; }



  /* ── Comment list ── */
  #commentList {
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
    min-height: 0;
    overflow-y: auto;
  }
  .comment-item {
    background: #31363F;
    border: 1px solid #76ABAE22;
    border-left: 3px solid #76ABAE33;
    border-radius: 8px;
    padding: 10px 12px;
    display: flex;
    gap: 10px;
    align-items: flex-start;
    transition: border-color .15s;
  }
  .comment-item:hover { border-color: #76ABAE66; }
  .comment-item.author-user-item { border-left-color: #f59e0b; }
  .comment-item.author-ai-item   { border-left-color: #76ABAE; }
  .comment-ts {
    font-size: 12px;
    color: #76ABAE;
    white-space: nowrap;
    font-weight: 700;
    cursor: pointer;
    min-width: 52px;
    letter-spacing: .03em;
    padding-top: 1px;
  }
  .comment-ts:hover { text-decoration: underline; color: #9ecbce; }
  .comment-body { flex: 1; font-size: 15px; color: #EEEEEE; line-height: 1.55; }
  .comment-author {
    font-size: 10px;
    padding: 2px 7px;
    border-radius: 10px;
    font-weight: 700;
    white-space: nowrap;
    letter-spacing: .04em;
    text-transform: uppercase;
  }
  .author-user { background: #78350f; color: #fcd34d; }
  .author-ai   { background: #1f3a3c; color: #76ABAE; }
  .comment-del {
    background: none; border: none; color: #76ABAE44; cursor: pointer;
    font-size: 16px; line-height: 1; padding: 0 2px; margin-top: -1px;
    transition: color .15s;
  }
  .comment-del:hover { color: #ef4444; }

  /* inline comment form */
  #inlineForm {
    display: none;
    gap: 6px;
    align-items: center;
    flex-wrap: wrap;
  }
  #inlineForm .ts-badge {
    background: #31363F;
    color: #76ABAE;
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 4px;
    white-space: nowrap;
  }
  #inlineInput {
    flex: 1;
    background: #31363F;
    border: 1px solid #76ABAE44;
    border-radius: 5px;
    padding: 6px 8px;
    color: #EEEEEE;
    font-size: 13px;
    min-width: 180px;
  }
  #inlineInput:focus { outline: none; border-color: #76ABAE; }

  /* ── Right chat panel ── */
  .chat-panel {
    display: flex;
    flex-direction: column;
    background: #1c2028;
    overflow: hidden;
    min-height: 0;
  }
  .chat-header {
    padding: 12px 16px;
    border-bottom: 1px solid #31363F;
    font-size: 13px;
    font-weight: 600;
    color: #76ABAE;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .chat-header span.dot {
    width: 7px; height: 7px;
    background: #22c55e;
    border-radius: 50%;
    display: inline-block;
  }
  #chatMessages {
    flex: 1;
    min-height: 0;
    overflow-y: auto;
    padding: 12px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .msg {
    max-width: 95%;
    padding: 8px 11px;
    border-radius: 8px;
    font-size: 12.5px;
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .msg-user {
    background: #31363F;
    color: #EEEEEE;
    align-self: flex-end;
    border-bottom-right-radius: 2px;
  }
  .msg-ai {
    background: #272d34;
    color: #EEEEEE;
    align-self: flex-start;
    border-bottom-left-radius: 2px;
    border: 1px solid #76ABAE22;
  }
  .msg-ai h1, .msg-ai h2, .msg-ai h3 { font-size: 13px; font-weight: 600; margin: 8px 0 4px; color: #76ABAE; }
  .msg-ai p { margin: 0 0 6px; }
  .msg-ai p:last-child { margin-bottom: 0; }
  .msg-ai ul, .msg-ai ol { padding-left: 16px; margin: 4px 0 6px; }
  .msg-ai li { margin-bottom: 2px; }
  .msg-ai strong { color: #EEEEEE; }
  .msg-ai code { background: #31363F; border-radius: 3px; padding: 1px 4px; font-size: 11.5px; }
  .msg-system {
    align-self: center;
    color: #55696d;
    font-size: 11px;
    font-style: italic;
  }
  .chat-input-area {
    border-top: 1px solid #31363F;
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  #chatInput {
    width: 100%;
    background: #31363F;
    border: 1px solid #76ABAE33;
    border-radius: 6px;
    padding: 8px 10px;
    color: #EEEEEE;
    font-size: 13px;
    resize: none;
    min-height: 60px;
    font-family: inherit;
  }
  #chatInput:focus { outline: none; border-color: #76ABAE; }
  .chat-actions {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .quick-btns {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
    padding: 0 12px 8px;
  }
  .quick-btn {
    background: #31363F;
    border: 1px solid #76ABAE33;
    color: #7a9699;
    font-size: 12px;
    padding: 6px 12px;
    border-radius: 12px;
    cursor: pointer;
    transition: all .15s;
  }
  .quick-btn:hover { border-color: #76ABAE; color: #76ABAE; }

  /* spinner */
  .spinner {
    display: inline-block;
    width: 14px; height: 14px;
    border: 2px solid #31363F;
    border-top-color: #76ABAE;
    border-radius: 50%;
    animation: spin .7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .mode-toggle-wrap { padding: 8px 12px; border-bottom: 1px solid #31363F; }
  .mode-track { position:relative; display:flex; background:#1a1f27; border-radius:20px; padding:3px; }
  .mode-thumb { position:absolute; top:3px; left:3px; width:calc(50% - 3px); height:calc(100% - 6px); background:#76ABAE; border-radius:17px; transition:left 0.2s ease; pointer-events:none; }
  .mode-opt { position:relative; z-index:1; flex:1; padding:5px 0; border:none; background:transparent; color:#7a9699; font-size:12px; font-weight:600; cursor:pointer; border-radius:17px; transition:color 0.15s; letter-spacing:0.03em; }
  .mode-opt.active { color:#222831; }
  .mode-desc { text-align:center; font-size:10px; color:#4a5568; margin-top:5px; }

  /* AI review action buttons in right panel */
  .ai-actions {
    display: flex;
    gap: 8px;
    padding: 10px 12px;
    border-bottom: 1px solid #31363F;
  }
  .ai-actions .btn { flex: 1; text-align: center; }

  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #31363F; border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>🎬 Video Ad Reviewer</h1>
  <span id="headerStatus">No video loaded</span>
  <label class="btn btn-primary" id="logoBtn" style="cursor:pointer; margin-left: auto; background:#a8764a; color:#222831;" title="Upload brand logo for consistency check">
    Upload Brand Logo
    <input type="file" id="logoInput" accept="image/*" style="display:none" />
  </label>
  <img id="logoPreview" style="display:none; height:26px; width:auto; border-radius:3px; margin-left:4px; vertical-align:middle; border:1px solid #444; object-fit:contain;" alt="brand logo" />
  <label class="btn btn-primary" style="cursor:pointer; margin-left: 0;">
    Upload Video
    <input type="file" id="uploadInput" accept="video/*" />
  </label>
</header>

<div id="uploadBanner"><span class="upload-spinner"></span><span id="uploadBannerText">Uploading video… please wait</span></div>

<div class="workspace">

  <!-- ── LEFT: Video + Timeline ── -->
  <div class="left-panel">
    <div class="video-wrap" id="videoWrap">
      <div class="upload-placeholder" id="uploadPlaceholder" onclick="document.getElementById('uploadInput').click()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M15.75 10.5l4.72-4.72a.75.75 0 011.28.53v11.38a.75.75 0 01-1.28.53l-4.72-4.72M4.5 18.75h9a2.25 2.25 0 002.25-2.25v-9A2.25 2.25 0 0013.5 5.25h-9A2.25 2.25 0 002.25 9.75v6.75A2.25 2.25 0 004.5 18.75z"/>
        </svg>
        <span>Upload a video to get started</span>
      </div>
      <video id="videoEl" style="display:none" controls></video>
    </div>

    <div class="timeline-section">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div class="timeline-label">Timeline — click to place a comment</div>
        <span id="currentTime">0:00 / 0:00</span>
      </div>

      <div class="timeline-bar-wrap" id="timelineBar">
        <div id="progressBar"></div>
        <div id="playhead"></div>
      </div>

      <!-- Inline comment form (appears when user clicks timeline) -->
      <div id="inlineForm">
        <span class="ts-badge" id="inlineTsBadge">0:00</span>
        <input id="inlineInput" type="text" placeholder="Type a comment and press Enter…" />
        <button class="btn btn-primary btn-sm" onclick="submitInlineComment()">Add</button>
        <button class="btn btn-ghost btn-sm" onclick="cancelInlineComment()">Cancel</button>
      </div>

      <div class="timeline-label" style="margin-top:4px">Comments</div>
      <div id="commentList">
        <div style="color:#444;font-size:12px;text-align:center;padding:16px 0">No comments yet</div>
      </div>
    </div>
  </div>

  <!-- ── RIGHT: Chat ── -->
  <div class="chat-panel">
  <div class="mode-toggle-wrap">
    <div class="mode-track">
      <div class="mode-thumb" id="modeThumb"></div>
      <button class="mode-opt active" id="optDeterministic" onclick="setMode('deterministic')">Deterministic</button>
      <button class="mode-opt" id="optCreative" onclick="setMode('creative')">Creative</button>
    </div>
    <div class="mode-desc" id="modeDesc">Precise &middot; consistent, high-confidence comments</div>
  </div>

    <div class="ai-actions">
      <button class="btn btn-ai btn-sm" onclick="aiAutoComment()">Start Full Review</button>
      <button class="btn btn-oracle btn-sm" onclick="oracleMode()">&#128302; The Oracle</button>
    </div>

    <div id="chatMessages">
      <div class="msg msg-system">Upload a video, then ask Gemini anything about it.</div>
    </div>

    <div class="quick-btns">
      <button class="quick-btn" onclick="quickAsk('What are the top 3 issues with this ad?')">Top 3 issues</button>
      <button class="quick-btn" onclick="quickAsk('Is the hook working?')">Hook?</button>
      <button class="quick-btn" onclick="quickAsk('How is the CTA?')">CTA?</button>
      <button class="quick-btn" onclick="quickAsk('Rate the pacing.')">Pacing</button>
      <button class="quick-btn" onclick="quickAsk(`What would you say about ${fmtTs(currentClickTs || 0)}?`)">This moment</button>
    </div>

    <div class="chat-input-area">
      <textarea id="chatInput" placeholder="Ask about the video… e.g. 'What would you say about 0:08?'"></textarea>
      <div class="chat-actions">
        <button class="btn btn-primary" style="flex:1" onclick="sendChat()">Send</button>
      </div>
    </div>
  </div>
</div>

<script>
// ── State ────────────────────────────────────────────────────────────────────
let videoReady = false;
let logoReady = false;
let pendingTs = null;
let currentClickTs = 0;
const TEMPS = { deterministic: 0.2, creative: 0.85 };
let currentTemperature = TEMPS.deterministic;

function setMode(mode) {
  currentTemperature = TEMPS[mode];
  document.getElementById('optDeterministic').classList.toggle('active', mode === 'deterministic');
  document.getElementById('optCreative').classList.toggle('active', mode === 'creative');
  document.getElementById('modeThumb').style.left = mode === 'creative' ? 'calc(50%)' : '3px';
  document.getElementById('modeDesc').textContent = mode === 'deterministic'
    ? 'Precise \u00b7 consistent, high-confidence comments'
    : 'Creative \u00b7 catches more obscure issues';
}
const videoEl = document.getElementById('videoEl');


// ── Upload ───────────────────────────────────────────────────────────────────
document.getElementById('uploadInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';

  const banner = document.getElementById('uploadBanner');
  banner.style.display = 'flex';
  document.getElementById('uploadBannerText').textContent = 'Uploading to Gemini… this may take a minute';
  document.getElementById('headerStatus').textContent = 'Uploading…';

  const fd = new FormData();
  fd.append('file', file);

  const controller = new AbortController();
  const uploadTimeout = setTimeout(() => controller.abort(), 5 * 60 * 1000); // 5 min

  try {
    const res = await fetch('/upload', { method: 'POST', body: fd, signal: controller.signal });
    clearTimeout(uploadTimeout);
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');

    // Show video
    document.getElementById('uploadPlaceholder').style.display = 'none';
    videoEl.style.display = 'block';
    videoEl.src = '/video?' + Date.now();
    videoEl.load();

    videoReady = true;
    document.getElementById('headerStatus').textContent = `Loaded: ${file.name}`;
    addSystemMsg('Video ready. Gemini has the file — click Start Full Review or ask a question.');
    await loadComments();
  } catch (err) {
    clearTimeout(uploadTimeout);
    const msg = err.name === 'AbortError' ? 'Upload timed out — try a smaller file' : err.message;
    alert('Upload error: ' + msg);
    document.getElementById('headerStatus').textContent = 'Upload failed';
  } finally {
    banner.style.display = 'none';
  }
});

// ── Logo Upload ──────────────────────────────────────────────────────────────
document.getElementById('logoInput').addEventListener('change', async (e) => {
  const file = e.target.files[0];
  if (!file) return;
  e.target.value = '';
  const fd = new FormData();
  fd.append('file', file);
  try {
    const res = await fetch('/upload-logo', { method: 'POST', body: fd });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Upload failed');
    logoReady = true;
    const preview = document.getElementById('logoPreview');
    preview.src = URL.createObjectURL(file);
    preview.style.display = 'inline';
    document.getElementById('logoBtn').style.color = '#76ABAE';
    addSystemMsg(`Brand logo set: ${file.name}. Brand consistency check is now active for Oracle runs.`);
  } catch (err) {
    alert('Logo upload error: ' + err.message);
  }
});

// ── Video controls ────────────────────────────────────────────────────────────
videoEl.addEventListener('timeupdate', updateTimeline);
videoEl.addEventListener('loadedmetadata', updateTimeline);

function togglePlay() {
  if (videoEl.paused) videoEl.play(); else videoEl.pause();
}

function updateTimeline() {
  const dur = videoEl.duration || 0;
  const t = videoEl.currentTime || 0;
  document.getElementById('progressBar').style.width = dur ? (t / dur * 100) + '%' : '0%';
  document.getElementById('playhead').style.left = dur ? (t / dur * 100) + '%' : '0%';
  document.getElementById('currentTime').textContent = fmtTs(t) + ' / ' + fmtTs(dur);
  currentClickTs = t;
}

// ── Timeline click → place comment ──────────────────────────────────────────
document.getElementById('timelineBar').addEventListener('click', (e) => {
  if (!videoReady) return;
  const rect = e.currentTarget.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const dur = videoEl.duration || 0;
  pendingTs = ratio * dur;
  videoEl.currentTime = pendingTs;

  document.getElementById('inlineTsBadge').textContent = fmtTs(pendingTs);
  const form = document.getElementById('inlineForm');
  form.style.display = 'flex';
  document.getElementById('inlineInput').focus();
});

document.getElementById('inlineInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); submitInlineComment(); }
  if (e.key === 'Escape') cancelInlineComment();
});

async function submitInlineComment() {
  const text = document.getElementById('inlineInput').value.trim();
  if (!text || pendingTs === null) return;
  await postComment(pendingTs, text, 'user');
  document.getElementById('inlineInput').value = '';
  cancelInlineComment();
}

function cancelInlineComment() {
  document.getElementById('inlineForm').style.display = 'none';
  pendingTs = null;
}

// ── Comments API ─────────────────────────────────────────────────────────────
async function loadComments() {
  const res = await fetch('/comments');
  const { comments } = await res.json();
  renderComments(comments);
  renderPins(comments);
}

async function postComment(timestamp, text, author = 'user') {
  const res = await fetch('/comments', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ timestamp, text, author }),
  });
  const entry = await res.json();
  await loadComments();
  return entry;
}

async function deleteComment(id) {
  await fetch('/comments/' + id, { method: 'DELETE' });
  await loadComments();
}

function renderComments(comments) {
  const list = document.getElementById('commentList');
  if (!comments.length) {
    list.innerHTML = '<div style="color:#444;font-size:12px;text-align:center;padding:16px 0">No comments yet</div>';
    return;
  }
  list.innerHTML = comments.map(c => `
    <div class="comment-item ${c.author === 'ai' ? 'author-ai-item' : 'author-user-item'}" id="ci-${c.id}">
      <span class="comment-ts" onclick="seekTo(${c.timestamp})" title="Jump to ${fmtTs(c.timestamp)}">${fmtTs(c.timestamp)}</span>
      <span class="comment-author ${c.author === 'ai' ? 'author-ai' : 'author-user'}">${c.author}</span>
      <span class="comment-body">${escHtml(c.text)}</span>
      <button class="comment-del" onclick="deleteComment('${c.id}')" title="Delete">&times;</button>
    </div>
  `).join('');
}

function renderPins(comments) {
  // Remove old pins
  document.querySelectorAll('.comment-pin').forEach(p => p.remove());
  const bar = document.getElementById('timelineBar');
  const dur = videoEl.duration || 0;
  if (!dur) return;
  comments.forEach(c => {
    const pin = document.createElement('div');
    pin.className = 'comment-pin ' + (c.author === 'ai' ? 'pin-ai' : 'pin-user');
    pin.style.left = (c.timestamp / dur * 100) + '%';
    pin.title = `[${fmtTs(c.timestamp)}] ${c.text}`;
    pin.onclick = () => seekTo(c.timestamp);
    bar.appendChild(pin);
  });
}

function seekTo(ts) {
  videoEl.currentTime = ts;
  // highlight comment
  document.querySelectorAll('.comment-item').forEach(el => el.style.outline = '');
}

// ── Chat ─────────────────────────────────────────────────────────────────────
async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  if (!videoReady) { alert('Upload a video first.'); return; }
  input.value = '';
  appendMsg(msg, 'user');
  const loadingEl = appendMsg('', 'ai', true);

  try {
    const res = await fetch('/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg, temperature: currentTemperature }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Chat error');
    loadingEl.remove();
    appendMsg(data.reply, 'ai');

    // If model posted auto-comments, reload
    if (data.auto_comments && data.auto_comments.length) {
      for (const [ts, text] of data.auto_comments) {
        await postComment(ts, text, 'ai');
      }
    }
  } catch (err) {
    loadingEl.remove();
    appendMsg('Error: ' + err.message, 'ai');
  }
}

async function postAiComments(flavorMsg) {
  if (!videoReady) { alert('Upload a video first.'); return; }
  const loadingEl = appendMsg('', 'ai', true, flavorMsg);

  try {
    const res = await fetch('/chat/post-ai-comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: 'Review this video ad and post timestamped comments for every issue found.', temperature: currentTemperature }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Error');
    loadingEl.remove();
    if (data.added.length > 0) {
      appendMsg(`Posted ${data.added.length} AI comment(s) to the timeline.`, 'ai');
    } else {
      appendMsg(`Gemini responded but no comments were parsed.\n\nRaw response:\n${data.raw}`, 'ai');
    }
    await loadComments();
  } catch (err) {
    loadingEl.remove();
    appendMsg('Error: ' + err.message, 'ai');
  }
}

async function aiAutoComment() {
  await postAiComments('Analyzing every frame...');
}

async function oracleMode() {
  if (!videoReady) { alert('Upload a video first.'); return; }
  const brandNote = logoReady ? ' A fourth eye opens — checking every brand asset against your reference logo.' : '';
  const loadingEl = appendMsg('🔮 The Oracle stirs... The first eye cracks open — scanning every face, hand, and body for AI traces. The second eye opens wide — reading every word, label, overlay, and package for AI-generated text. The third eye unfolds — examining environments, objects, image quality, audio, and AV alignment. All three eyes are open. Searching for imperfections...' + brandNote, 'ai');
  try {
    const res = await fetch('/chat/oracle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: '', temperature: currentTemperature }),
    });
    if (!res.ok) {
      let detail = `Oracle failed (HTTP ${res.status})`;
      try { const e = await res.json(); detail = e.detail || detail; } catch {}
      throw new Error(detail);
    }
    const data = await res.json();
    loadingEl.remove();
    const summary = data.passes.map(p => `${p.pass}: ${p.count} issues`).join(' · ');
    appendMsg(`🔮 The Oracle has spoken — ${data.added.length} total issue(s) marked on the timeline.\n${summary}`, 'ai');
    await loadComments();
  } catch (err) {
    loadingEl.remove();
    appendMsg('Oracle error: ' + err.message, 'ai');
  }
}

function quickAsk(text) {
  document.getElementById('chatInput').value = text;
  sendChat();
}

document.getElementById('chatInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendChat(); }
});

// ── UI helpers ────────────────────────────────────────────────────────────────
function appendMsg(text, role, loading = false, loadingText = null) {
  const div = document.createElement('div');
  div.className = 'msg msg-' + role;
  if (loading) {
    div.innerHTML = `<span class="spinner"></span>${loadingText || 'Gemini is analyzing the video…'}`;
  } else if (role === 'ai') {
    div.innerHTML = marked.parse(text);
  } else {
    div.textContent = text;
  }
  document.getElementById('chatMessages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
  return div;
}

function addSystemMsg(text) {
  const div = document.createElement('div');
  div.className = 'msg msg-system';
  div.textContent = text;
  document.getElementById('chatMessages').appendChild(div);
  div.scrollIntoView({ behavior: 'smooth' });
}

function fmtTs(sec) {
  if (!sec && sec !== 0) return '0:00';
  const m = Math.floor(sec / 60);
  const s = (sec % 60).toFixed(2).padStart(5, '0');
  return `${m}:${s}`;
}

function escHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
